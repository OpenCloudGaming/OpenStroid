name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug and how to reproduce it
      placeholder: |
        What went wrong?

        Steps to reproduce (if applicable):
        1. ...
        2. ...
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Windows
        - Linux
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs (required)
      description: |
        Please attach any relevant logs or console output.
        You can find logs in your system's app data folder, or by running OpenStroid
        from a terminal to capture output directly.
      placeholder: Paste your log output here...
      render: shell
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots (optional)
      description: If applicable, add screenshots to help explain your problem
